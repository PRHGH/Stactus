name: Lint and Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        shell: bash
        run: |
          set +e
          npm run lint 2>&1 | tee lint.log
          lint_exit=${PIPESTATUS[0]}
          set -e
          if [ "$lint_exit" -ne 0 ]; then
            echo "::error title=ESLint check failed::Lint issues found. Run 'npm run lint:fix' locally and commit the results."
            exit "$lint_exit"
          fi

      - name: Run Prettier check
        shell: bash
        run: |
          set +e
          npm run format:check 2>&1 | tee prettier.log
          prettier_exit=${PIPESTATUS[0]}
          set -e
          if [ "$prettier_exit" -ne 0 ]; then
            echo "::error title=Prettier check failed::Formatting issues found. Run 'npm run format' locally and commit the results."
            exit "$prettier_exit"
          fi
