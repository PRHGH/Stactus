name: Docker Build and Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: docker.io/${{ secrets.DOCKER_USERNAME }}/acquisitions-app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set timestamp tag value
        id: timestamp
        shell: bash
        run: echo "value=$(date -u +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=prod-${{ steps.timestamp.outputs.value }}

      - name: Build and push Docker image
        id: build_and_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Add publish summary
        shell: bash
        run: |
          {
            echo "## Docker Publish Summary"
            echo "- Image: \`${{ env.IMAGE_NAME }}\`"
            echo "- Digest: \`${{ steps.build_and_push.outputs.digest }}\`"
            echo "- Tags:"
            while IFS= read -r tag; do
              if [ -n "$tag" ]; then
                echo "  - \`$tag\`"
              fi
            done <<< "${{ steps.meta.outputs.tags }}"
          } >> "$GITHUB_STEP_SUMMARY"
